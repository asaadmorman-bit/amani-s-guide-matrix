name: "🛡️ AMANI MATRIX // PHYSIOLOGICAL CIRCUIT BREAKER"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  evaluate-health-gate:
    name: "Intercept & Verify Physiological States"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout Code Repository"
        uses: actions/checkout@v4

      - name: "Evaluate Biometric Gating State"
        id: check_gate
        run: |
          # 1. Check if the user has configured an external server URL secret
          if [ -n "${{ secrets.BIOMETRIC_GATE_URL }}" ]; then
            echo "📡 External URL Secret detected. Polling Cloud Edge..."
            RESPONSE=$(curl -s -m 10 "${{ secrets.BIOMETRIC_GATE_URL }}")
            
            # Extract boolean gate trigger text from raw API response payload
            if echo "$RESPONSE" | grep -q '"automationGated":\s*true'; then
              echo "gated=true" >> $GITHUB_OUTPUT
            else
              echo "gated=false" >> $GITHUB_OUTPUT
            fi
          
          # 2. Fall back to local file parsing if no URL secret exists
          else
            echo "🏠 No URL Secret found. Parsing local gate-status.json configuration..."
            if [ -f "gate-status.json" ]; then
              GATED=$(jq -r '.automationGated' gate-status.json)
              echo "gated=$GATED" >> $GITHUB_OUTPUT
            else
              echo "⚠️ Missing gate-status.json. Bypassing gate defensively."
              echo "gated=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: "Verify Health Threshold Guardrails"
        if: steps.check_gate.outputs.gated == 'true'
        run: |
          echo "======================================================================"
          echo "🚨 CRITICAL PIPELINE INTERCEPT VIA PHYSIOLOGICAL CIRCUIT BREAKER 🚨"
          echo "======================================================================"
          echo "WARNING: Wearable telemetry indicators show severe acute fatigue levels."
          echo "Current recovery parameters have fallen beneath established safe ceilings."
          echo "Execution of automated deployment builds has been locked down."
          echo "To override, authorize session via physical FIDO2 secure matrix token."
          echo "======================================================================"
          exit 1

      - name: "Proceed with Build Matrix"
        if: steps.check_gate.outputs.gated == 'false'
        run: |
          echo "======================================================================"
          echo "✓ SYSTEM OPERATIONS CLEARANCE CONFIRMED"
          echo "======================================================================"
          echo "Telemetry thresholds normal. Safe for processing compilation routines."
