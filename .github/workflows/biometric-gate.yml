name: "🛡️ AMANI MATRIX // PRE-FLIGHT BIOMETRIC GUARD"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  evaluate-health-gate:
    name: "Intercept & Verify Physiological States"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout Code Repository"
        uses: actions/checkout@v4

      - name: "Parse Local Telemetry Token"
        id: check_gate
        run: |
          echo "📡 Reading local gate-status.json parameter..."
          
          # Read the status directly out of your local repository file
          GATED=$(jq -r '.automationGated' gate-status.json)
          echo "Automation Gated Status: $GATED"
          
          # Set the environment variable output string for the next step
          echo "gated=$GATED" >> $GITHUB_OUTPUT

      - name: "Evaluate Health Threshold Guardrails"
        if: steps.check_gate.outputs.gated == 'true'
        run: |
          echo "======================================================================"
          echo "🚨 CRITICAL PIPELINE INTERCEPT VIA PHYSIOLOGICAL CIRCUIT BREAKER 🚨"
          echo "======================================================================"
          echo "WARNING: Wearable telemetry indicators show severe fatigue levels."
          echo "Execution of automated deployment builds has been locked down."
          echo "To override, authorize session via physical FIDO2 secure matrix token."
          echo "======================================================================"
          exit 1

      - name: "Proceed with Build Matrix"
        if: steps.check_gate.outputs.gated == 'false'
        run: |
          echo "======================================================================"
          echo "✓ SYSTEM OPERATIONS CLEARANCE CONFIRMED"
          echo "======================================================================"
          echo "Telemetry thresholds clear. Safe for production processing compilation."
