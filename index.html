<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amani Multi-Agent Strategy Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 antialiased font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
          const [systemState, setSystemState] = useState({ initialized: false, profiles: [] });
          const [activeProfile, setActiveProfile] = useState(null);
          const [dashboardData, setDashboardData] = useState({ trackedParameters: [], customAgents: [], strategyAssets: [], activeTasks: [] });
          const [loading, setLoading] = useState(true);

          // Onboarding Wizard configurations
          const [onboardType, setOnboardType] = useState('both'); 
          const [socialChannels, setSocialChannels] = useState({ X: true, YouTube: false, LinkedIn: true });
          const [targetMonthlyBudget, setTargetMonthlyBudget] = useState('5000');

          // Inputs form variables
          const [inputCat, setInputCat] = useState('Workflows');
          const [inputName, setInputName] = useState('');
          const [inputValue, setInputValue] = useState('');
          const [agentName, setAgentName] = useState('');
          const [agentPurpose, setAgentPurpose] = useState('');
          const [genToken, setGenToken] = useState('');

          const checkSystemInit = async () => {
            const res = await fetch('/api/system-status');
            const data = await res.json();
            setSystemState(data);
            if(data.initialized && data.profiles.length > 0) {
              const defaultProfile = data.profiles[0];
              setActiveProfile(defaultProfile);
              loadProfileData(defaultProfile.id);
            }
            setLoading(false);
          };

          const loadProfileData = async (profileId) => {
            const res = await fetch(`/api/state/${profileId}`);
            const data = await res.json();
            setDashboardData(data);
          };

          useEffect(() => { checkSystemInit(); }, []);

          const executeOnboarding = async () => {
            setLoading(true);
            const profilesSetup = [];

            if (onboardType === 'business' || onboardType === 'both') {
              profilesSetup.push({
                name: "Business & Content Operations",
                description: "Strategy, Production Metrics, Posting Frequency & Market Monitoring",
                category: "Business",
                parameters: [
                  { name: "Content Suggestion Queue", value: "3 Fresh Drafts Generated" },
                  { name: "Current Market Trends Index", value: "AI Agents/Automation Uptrending" },
                  { name: "Global Posting Status", value: "Frequency: 2x Daily Active" }
                ],
                agents: [
                  { name: "SocialPostingAgent", purpose: "Manages social queues, timing configurations, and cross-posting automation" },
                  { name: "TrendScraperNode", purpose: "Polls RSS and API vectors for trending industry topics" },
                  { name: "StrategyOptimizer", purpose: "Evaluates conversion frequency, duration metrics, and workflow bottlenecks" }
                ],
                initialStrategy: {
                  target_frequency: "2 posts per day",
                  monitored_sectors: "AI Automation, Content Distribution, SaaS Metrics",
                  target_duration_avg: "45-second short form vertical"
                }
              });
            }

            if (onboardType === 'life' || onboardType === 'both') {
              profilesSetup.push({
                name: "Life Structure & Family Architecture",
                description: "Personal Finances, Budgets, Goals, Family Coordination, Time Optimization",
                category: "Lifestyle",
                parameters: [
                  { name: "Operational Budget Track", value: `$${targetMonthlyBudget}/mo Max Threshold` },
                  { name: "Family Calendar Core Sync", value: "Nominal Sync Connection Stable" },
                  { name: "Core Milestone Matrix Goals", value: "Quarterly Strategy Setup Active" }
                ],
                agents: [
                  { name: "FinancialAuditNode", purpose: "Scrapes incoming receipts, analyzes expenditures, alerts balance locks" },
                  { name: "TimeManagementOptimizer", purpose: "Performs calendar parsing to shield screen-free down-time blocks" },
                  { name: "FamilySyncAgent", purpose: "Automates task assignment and reminders across shared ecosystem channels" }
                ],
                initialStrategy: {
                  monthly_budget_cap: `$${targetMonthlyBudget}`,
                  time_management_priority: "Prioritize screen-free domestic wind-down blocks starting 7 PM",
                  core_year_goals: "Build out autonomous sovereign hosting grid infrastructure"
                }
              });
            }

            await fetch('/api/onboarding/initialize', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ profilesSetup })
            });
            await checkSystemInit();
          };

          const dispatchTaskPulse = async (type, payloadText, agent) => {
            await fetch('/api/tasks/dispatch', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                profileId: activeProfile.id,
                taskType: type,
                assignedAgent: agent,
                payload: { action: payloadText }
              })
            });
            loadProfileData(activeProfile.id);
          };

          const addCustomField = async (e) => {
            e.preventDefault();
            const res = await fetch('/api/fields', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ profileId: activeProfile.id, category: inputCat, name: inputName, value: inputValue })
            });
            const data = await res.json();
            setDashboardData(prev => ({ ...prev, trackedParameters: data.trackedParameters }));
            setInputName(''); setInputValue('');
          };

          const registerAgent = async (e) => {
            e.preventDefault();
            const res = await fetch('/api/agents/register', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ profileId: activeProfile.id, name: agentName, purpose: agentPurpose })
            });
            const data = await res.json();
            setGenToken(data.token);
            setAgentName(''); setAgentPurpose('');
            loadProfileData(activeProfile.id);
          };

          if (loading) return <div className="p-8 text-center font-mono text-slate-500">Connecting to Core Matrix Database Grid...</div>;

          // SYSTEM SETUP ONBOARDING VIEWPORT
          if (!systemState.initialized) {
            return (
              <div className="min-h-screen bg-slate-950 flex items-center justify-center p-6">
                <div className="max-w-xl w-full bg-slate-900 border border-slate-800 rounded-3xl p-8 space-y-6 font-mono shadow-2xl">
                  <div className="border-b border-slate-800 pb-4">
                    <h1 className="text-md font-black tracking-widest text-cyan-400">AMANI // ARCHITECTURE SETTING SYSTEM</h1>
                    <p className="text-[10px] text-slate-500 uppercase mt-1">Configure Strategic Matrix Core Profiles & Use Cases</p>
                  </div>

                  <div className="space-y-2">
                    <label className="text-xs text-slate-400 block font-bold uppercase tracking-wider">1. Select Target Use-Case Deployment Strategy:</label>
                    <select value={onboardType} onChange={(e) => setOnboardType(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-xs text-slate-200 outline-none">
                      <option value="both">All-in-One Engine (Business Strategy, Content Postings, Budget, Family Sync)</option>
                      <option value="business">Business & Content Operations Shell Only (Trends, Postings, Analytics)</option>
                      <option value="life">Life Structure & Family Architecture Shell Only (Finances, Goals, Timelines)</option>
                    </select>
                  </div>

                  {(onboardType === 'business' || onboardType === 'both') && (
                    <div className="space-y-2 p-4 bg-slate-950/50 border border-slate-800 rounded-xl space-y-3">
                      <label className="text-[11px] text-cyan-400 font-bold block uppercase tracking-wider">Content Operations Parameter Config:</label>
                      <div className="flex space-x-4 text-xs">
                        {Object.keys(socialChannels).map(ch => (
                          <label key={ch} className="flex items-center space-x-2 text-slate-300">
                            <input type="checkbox" checked={socialChannels[ch]} onChange={() => setSocialChannels(p => ({ ...p, [ch]: !p[ch] }))} className="accent-cyan-500" />
                            <span>{ch} API Connection</span>
                          </label>
                        ))}
                      </div>
                    </div>
                  )}

                  {(onboardType === 'life' || onboardType === 'both') && (
                    <div className="space-y-2 p-4 bg-slate-950/50 border border-slate-800 rounded-xl space-y-2">
                      <label className="text-[11px] text-cyan-400 font-bold block uppercase tracking-wider">Financial Structure Target Config:</label>
                      <div className="flex items-center space-x-3 text-xs">
                        <span className="text-slate-400 text-xs">Monthly Budget Ceiling:</span>
                        <input type="text" value={targetMonthlyBudget} onChange={(e) => setTargetMonthlyBudget(e.target.value)} className="bg-slate-950 border border-slate-800 p-2 rounded-lg outline-none w-28 text-cyan-400 font-bold" />
                        <span className="text-slate-500">USD/mo</span>
                      </div>
                    </div>
                  )}

                  <button onClick={executeOnboarding} className="w-full bg-cyan-500 hover:bg-cyan-400 text-slate-950 text-xs font-bold py-3.5 rounded-xl uppercase tracking-widest transition shadow-lg shadow-cyan-500/10">
                    ⚡ Instantiate Profiles & Dispatch Base Agents
                  </button>
                </div>
              </div>
            );
          }

          // CORE MATRIX OPERATION PANEL
          return (
            <div className="min-h-screen bg-slate-950 flex flex-col p-6">
              <header className="border-b border-slate-800 pb-4 flex justify-between items-center mb-6 font-mono">
                <div>
                  <h1 className="text-sm font-black tracking-widest text-slate-200">AMANI // OPERATIONAL COMMAND MATRIX</h1>
                  <div className="flex space-x-2 mt-2">
                    {systemState.profiles.map(prof => (
                      <button key={prof.id} onClick={() => { setActiveProfile(prof); loadProfileData(prof.id); }} className={`px-3 py-1.5 rounded-lg text-[10px] uppercase tracking-wider font-mono transition ${activeProfile?.id === prof.id ? 'bg-cyan-500 text-slate-950 font-black shadow-lg shadow-cyan-500/10' : 'bg-slate-900 border border-slate-800 text-slate-400'}`}>
                        {prof.name}
                      </button>
                    ))}
                  </div>
                </div>
                <span className="bg-slate-900 border border-slate-800 px-3 py-1.5 text-xs text-cyan-400 font-bold rounded-xl font-mono">● Grid Online</span>
              </header>

              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div className="lg:col-span-2 space-y-6">
                  
                  {/* REAL-TIME MATRIX CELL METRICS */}
                  <section className="bg-slate-900 border border-slate-800 rounded-2xl p-6 space-y-4 shadow-2xl">
                    <h3 className="text-xs font-bold tracking-widest text-slate-400 uppercase font-mono">Telemetry Coordinates Grid — {activeProfile?.name}</h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      {dashboardData.trackedParameters?.map(p => (
                        <div key={p.id} className="p-4 bg-slate-950 border border-slate-800 rounded-xl font-mono flex flex-col justify-between space-y-2">
                          <div className="flex justify-between items-center">
                            <span className="text-[9px] bg-slate-900 text-slate-400 border border-slate-800 px-2 py-0.5 rounded font-bold uppercase">{p.category}</span>
                            <span className="text-[10px] font-bold text-emerald-400">● {p.status}</span>
                          </div>
                          <div>
                            <div className="text-xs text-slate-400 font-bold font-sans">{p.name}</div>
                            <div className="text-sm font-bold text-slate-100 mt-1">{p.value}</div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </section>

                  {/* CORE STRATEGY & STATIC ASSETS ENGINE */}
                  <section className="bg-slate-900 border border-slate-800 rounded-2xl p-6 space-y-4 shadow-2xl">
                    <h3 className="text-xs font-bold tracking-widest text-slate-400 uppercase font-mono">Core Strategy Config Assets (Knowledge Base)</h3>
                    <div className="space-y-2">
                      {dashboardData.strategyAssets?.map(asset => (
                        <div key={asset.id} className="p-3 bg-slate-950 border border-slate-800 rounded-xl flex font-mono text-xs items-center justify-between">
                          <span className="text-slate-400 uppercase text-[10px] bg-slate-900 border border-slate-800/60 px-2 py-0.5 rounded">{asset.knowledge_key.replace('_',' ')}</span>
                          <span className="text-slate-200 font-bold text-right ml-4">{asset.knowledge_value}</span>
                        </div>
                      ))}
                    </div>
                  </section>

                  {/* ACTIVE LIVE TASK BROKER QUEUE */}
                  <section className="bg-slate-900 border border-slate-800 rounded-2xl p-6 space-y-4 shadow-2xl">
                    <h3 className="text-xs font-bold tracking-widest text-slate-400 uppercase font-mono">Agent Operational Task Buffer Queue</h3>
                    <div className="space-y-2 font-mono text-xs">
                      {dashboardData.activeTasks?.length === 0 && <p className="text-slate-500 italic">No instructions buffered in the task queue engine.</p>}
                      {dashboardData.activeTasks?.map(task => (
                        <div key={task.id} className="p-3 bg-slate-950 border border-slate-800 rounded-xl flex justify-between items-center">
                          <div>
                            <span className="text-amber-400 font-bold">[{task.task_type}]</span>
                            <span className="text-slate-400 ml-3 text-[11px]">Assigned Agent Target: {task.assigned_agent}</span>
                          </div>
                          <span className={`text-[10px] px-2 py-0.5 rounded font-bold uppercase ${task.status === 'Pending' ? 'bg-amber-950/40 text-amber-400 animate-pulse border border-amber-800/40' : 'bg-emerald-950/40 text-emerald-400 border border-emerald-800/40'}`}>{task.status}</span>
                        </div>
                      ))}
                    </div>
                  </section>
                </div>

                <div className="space-y-6 font-mono">
                  {/* COCKPIT DISPATCH TRIGGERS COCKPIT */}
                  <section className="bg-gradient-to-br from-slate-900 to-slate-950 border border-slate-800 rounded-2xl p-6 space-y-4 shadow-2xl">
                    <h3 className="text-xs font-bold tracking-widest text-slate-400 uppercase">Strategic Operation Controls</h3>
                    <p className="text-[10px] text-slate-500 uppercase mt-0.5">Inject ad-hoc action items directly into the agent tasks stream</p>
                    
                    <div className="space-y-2 text-xs">
                      {activeProfile?.name.includes("Business") ? (
                        <>
                          <button onClick={() => dispatchTaskPulse('POSTING_SUGGESTION', 'Generate content variations targeting automated systems integration templates', 'SocialPostingAgent')} className="w-full bg-slate-800 border border-slate-700 hover:bg-slate-700 p-2.5 font-bold rounded-xl text-left text-cyan-400 flex justify-between">
                            <span>⚡ Request Post Content Suggestion</span> <span>→</span>
                          </button>
                          <button onClick={() => dispatchTaskPulse('TREND_SCRAPE', 'Scrape major data vectors regarding developer workflow changes', 'TrendScraperNode')} className="w-full bg-slate-800 border border-slate-700 hover:bg-slate-700 p-2.5 font-bold rounded-xl text-left text-cyan-400 flex justify-between">
                            <span>⚡ Scrape Market Trends Index</span> <span>→</span>
                          </button>
                        </>
                      ) : (
                        <>
                          <button onClick={() => dispatchTaskPulse('BUDGET_AUDIT', 'Audit ledger transactions against budget thresholds caps', 'FinancialAuditNode')} className="w-full bg-slate-800 border border-slate-700 hover:bg-slate-700 p-2.5 font-bold rounded-xl text-left text-cyan-400 flex justify-between">
                            <span>⚡ Run Financial Ledger Audit</span> <span>→</span>
                          </button>
                          <button onClick={() => dispatchTaskPulse('TIME_BLOCK_SYNC', 'Parse incoming digital strings to shield offline evening down-time blocks', 'TimeManagementOptimizer')} className="w-full bg-slate-800 border border-slate-700 hover:bg-slate-700 p-2.5 font-bold rounded-xl text-left text-cyan-400 flex justify-between">
                            <span>⚡ Enforce Time Block Shielding</span> <span>→</span>
                          </button>
                        </>
                      )}
                    </div>
                  </section>

                  {/* INSTANTIATE CUSTOM AGENT NODE */}
                  <section className="bg-slate-900 border border-slate-800 rounded-2xl p-6 space-y-4 shadow-2xl">
                    <h3 className="text-xs font-bold tracking-widest text-slate-400 uppercase">Spawn Custom Agent Node</h3>
                    <form onSubmit={registerAgent} className="space-y-3 text-xs">
                      <input type="text" required value={agentName} onChange={(e) => setAgentName(e.target.value)} placeholder="Agent Registry Node Name" className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-slate-200 outline-none" />
                      <input type="text" required value={agentPurpose} onChange={(e) => setAgentPurpose(e.target.value)} placeholder="Target Operational Flow Parameter" className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-slate-200 outline-none" />
                      <button type="submit" className="w-full bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-bold py-2.5 rounded-xl uppercase tracking-wider transition">Instantiate Agent spec</button>
                    </form>
                    {genToken && (
                      <div className="mt-2 p-2 bg-slate-950 border border-slate-800 rounded-lg text-[9px] break-all text-slate-400">
                        <span className="text-cyan-400 font-bold">Bearer Token:</span> {genToken}
                      </div>
                    )}
                  </section>

                  {/* INJECT AD-HOC TELEMETRY FIELD */}
                  <section className="bg-slate-900 border border-slate-800 rounded-2xl p-6 space-y-4 shadow-2xl">
                    <h3 className="text-xs font-bold tracking-widest text-slate-400 uppercase font-mono">Inject Coordinate Node</h3>
                    <form onSubmit={addCustomField} className="space-y-3 text-xs">
                      <input type="text" required value={inputName} onChange={(e) => setInputName(e.target.value)} placeholder="Metric Key Identifier" className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-slate-200 outline-none" />
                      <input type="text" required value={inputValue} onChange={(e) => setInputValue(e.target.value)} placeholder="Data Coordinate Value" className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-slate-200 outline-none" />
                      <button type="submit" className="w-full bg-slate-800 hover:bg-slate-700 border border-slate-700 font-bold py-2.5 rounded-xl text-slate-200 transition">Inject Field Node</button>
                    </form>
                  </section>
                </div>

              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
