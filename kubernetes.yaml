apiVersion: apps/v1
kind: Deployment
metadata:
  name: amani-cognitive-engine
  namespace: default
  labels:
    app: amani-studio
spec:
  replicas: 3 # Spins up 3 parallel self-healing replica sets
  selector:
    matchLabels:
      app: amani-studio
  template:
    metadata:
      labels:
        app: amani-studio
    spec:
      containers:
      - name: studio-core
        image: your-private-registry.local/amani/engine:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        - containerPort: 5173
        resources:
          limits:
            cpu: "2"
            memory: 4Gi
          requests:
            cpu: "500m"
            memory: 1Gi
        # Automated Infrastructure Liveness Health Checks
        livenessProbe:
          httpGet:
            path: /api/auditor-evidence
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: amani-studio-service
  namespace: default
spec:
  type: LoadBalancer # Dynamically maps to your private cloud VIP or public cloud LoadBalancer
  ports:
  - name: api
    port: 3000
    targetPort: 3000
  - name: web
    port: 5173
    targetPort: 5173
  selector:
    app: amani-studio